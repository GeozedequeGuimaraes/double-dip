<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Double Dip | Sorvetes e Picolés</title>
    <link rel="shortcut icon" href="imagens/food-stand 1.png">
</head>

<body>
    <header class="menu">
        <div class="menu-logo">
            <img src="imagens/Component 1.png" alt="Logo Double Dip">
        </div>

        <div class="barra-pesquisa">
            <input type="text" class="txt-pesquisa" placeholder="Procure seu sorvete"/>
            <a href="#" class="btn-pesquisa" aria-label="Buscar">
                <img src="imagens/Vector.png" alt="Buscar"/>
            </a>
        </div>
    </header>

    <section class="section-titulo">
        <h2>Nossos Picolés</h2>
        <p>Escolha o sabor que combina com você</p>
    </section>

    <section class="grid-picole">
        <div class="grid-grupo">
            <div class="caixa-maior">
                <div class="caixa-maior-img">
                    <img src="imagens/v2_tablito-30454210-png.png.ulenscale 1.png" alt="Picolé Tablito">
                </div>
                <div class="caixa-maior-info">
                    <strong class="nome-picole">Picolé Tablito</strong>
                    <p>Picolé de chocolate tradicional e branco 106g (R$ 0,05/g)</p>
                    <strong class="valor-picole">R$ 5,00</strong>
                </div>
            </div>

            <div class="caixa-menor">
                <img src="imagens/v2_brigadeiro-30454213-png.png.ulenscale 1.png" alt="Picolé de Brigadeiro">
            </div>

            <div class="caixa-menor">
                <img src="imagens/unil0434_dsg_67804196_kolorix_uva-1757997-png.png.ulenscale 1.png" alt="Picolé de Uva">
            </div>
        </div>

        <div class="grid-grupo">
            <div class="caixa-maior">
                <div class="caixa-maior-img">
                    <img src="imagens/kibon-p-chica 1.png" alt="Picolé Chica Bon">
                </div>
                <div class="caixa-maior-info">
                    <strong class="nome-picole">Chica Bon</strong>
                    <p>Picolé de chocolate tradicional 106g (R$ 0,05/g)</p>
                    <strong class="valor-picole">R$ 5,00</strong>
                </div>
            </div>

            <div class="caixa-menor">
                <img src="imagens/v2_morango-30454219-png.png.ulenscale 1.png" alt="Picolé de Morango">
            </div>

            <div class="caixa-menor">
                <img src="imagens/kibom-minions-40004485-png.png.ulenscale 1.png" alt="Picolé Minions">
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-logo">
            <img src="imagens/Component 2.png" alt="Logo Double Dip">
        </div>

        <div class="footer-social">
            <div class="contato-item">
                <img src="imagens/telefone.png" alt="Telefone">
                <p>81 3511-1259</p>
            </div>
            <div class="contato-item">
                <img src="imagens/email.png" alt="E-mail">
                <p>doubledip@org.com</p>
            </div>
            <div class="contato-item">
                <img src="imagens/insta.png" alt="Instagram">
                <p>@doubledip.store</p>
            </div>
        </div>

        <div class="footer-text">
            <p>Made with &lt;/&gt; and &lt;3 by Geozedeque</p>
        </div>
    </footer>
</body>
</html>
